<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- VLINCS gallery: camera observations (satellites) resolve into one identity (center node). -->
  <rect x="1" y="1" width="30" height="30" rx="7" fill="#0a0d10" stroke="#1b2733" stroke-width="1"/>
  <g stroke="#4ea1ff" stroke-width="1.8" stroke-linecap="round" opacity="0.6">
    <line x1="16" y1="16" x2="16" y2="7"/>
    <line x1="16" y1="16" x2="8.2" y2="20.5"/>
    <line x1="16" y1="16" x2="23.8" y2="20.5"/>
  </g>
  <!-- camera-observation nodes -->
  <g fill="#4ea1ff" opacity="0.92">
    <circle cx="16" cy="7" r="2.6"/>
    <circle cx="8.2" cy="20.5" r="2.6"/>
    <circle cx="23.8" cy="20.5" r="2.6"/>
  </g>
  <!-- resolved-identity node (the match/resolve target) -->
  <circle cx="16" cy="16" r="6.4" fill="none" stroke="#4ea1ff" stroke-width="1.1" opacity="0.34"/>
  <circle cx="16" cy="16" r="4.3" fill="#4ea1ff"/>
  <circle cx="16" cy="16" r="1.7" fill="#0a0d10" opacity="0.55"/>
</svg>
