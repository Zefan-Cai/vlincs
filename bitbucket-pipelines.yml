# VLINCS gallery — self-hosted CI on maxwell. Runs on a Linux SHELL runner (runs-on self.hosted), so the
# script executes directly on maxwell: it uses the host Docker + Compose and can see the datastore mount
# (/mnt/datastore2_videolincs/data — needed for GT + camera geo). That host access is exactly what a Docker
# runner's DinD sandbox could NOT provide, which is why this is a shell runner.
#
# No top-level `image:` and no `services: docker` — both are container-runner concepts the shell runner
# ignores. Script lines are unquoted YAML scalars, so keep them free of a colon-space ': '.
#
# Iteration config on branch ci/gallery-scores; promoted to `main` once green.

pipelines:
  branches:
    'ci/gallery-scores':
      - step:
          name: MS02 gallery demo (offline) + score
          runs-on:
            - self.hosted
            - linux.shell
          script:
            - set -x
            # The shell runner points DOCKER_HOST at a DinD service (tcp://localhost:2375) that does not exist
            # here. Unset it so the docker CLI uses maxwell's host daemon at /var/run/docker.sock (the runner
            # user is in the docker group). This is what lets the demo see the /mnt datastore mount.
            - unset DOCKER_HOST
            - docker version | head -5
            # the datastore mount must be visible to host-launched containers (it is, on the shell runner)
            - docker run --rm -v /mnt/datastore2_videolincs/data:/x:ro alpine sh -c "echo PROBE_MOUNT_OK && ls /x | head" || echo "PROBE HOST-BIND-MOUNT FAILED"
            - cd kit
            - export DATA_ROOT=/mnt/datastore2_videolincs/data
            - export COMPOSE_PROJECT_NAME=gallery_ci
            - docker compose down -v || true
            - docker compose build app
            - docker compose run --rm app demo --dataset ms02 2>&1 | tee ../ms02_score.txt
            - docker compose down -v || true
          artifacts:
            - ms02_score.txt
