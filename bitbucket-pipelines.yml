# VLINCS gallery — self-hosted CI on maxwell (runner: maxwell-gallery, runs-on self.hosted).
# Runs the online-gallery demos and prints the IDF1/AssA scores. CPU-only, no GPU.
# Needs maxwell's datastore mount (/mnt/datastore2_videolincs/data) for GT + camera geo — that's why
# this only runs on the self-hosted runner, never on Bitbucket's cloud runners.
#
# NOTE: this is the iteration config (branch ci/gallery-scores). Once green it gets promoted to main.
# Script lines are unquoted YAML scalars, so they must NOT contain a colon-space ': ' (YAML reads it as a
# mapping). Keep echo strings colon-free.

image: atlassian/default-image:4

pipelines:
  branches:
    'ci/gallery-scores':
      - step:
          name: Probe + MS02 demo
          runs-on:
            - self.hosted
            - linux
          services:
            - docker
          script:
            - set -x
            - docker version
            - docker info 2>/dev/null | grep -iE "server version|root dir" || true
            - docker ps --format '{{.Names}}' | grep -i runner && echo "PROBE host-daemon sibling model" || echo "PROBE not-host-daemon likely DinD"
            - docker run --rm -v /mnt/datastore2_videolincs/data:/x:ro alpine sh -c "echo PROBE_MOUNT_OK && ls /x | head" || echo "PROBE HOST-BIND-MOUNT FAILED"
            - cd kit
            - export DATA_ROOT=/mnt/datastore2_videolincs/data
            - export COMPOSE_PROJECT_NAME=gallery_ci
            - docker compose down -v || true
            - docker compose build app
            - docker compose run --rm app demo --dataset ms02 2>&1 | tee ../ms02_score.txt
            - docker compose down -v || true
          artifacts:
            - ms02_score.txt
